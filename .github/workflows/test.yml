name: Test

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Taskfile.yml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Taskfile.yml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/test.yml'
  merge_group:
    branches: [main]

jobs:
  compute-matrix:
    name: Compute test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-latest","test_mode":"daemon","test_threads":4,"daemon_pool":4},{"os":"ubuntu-latest","test_mode":"wrapper-daemon","test_threads":4,"daemon_pool":4},{"os":"macos-latest","test_mode":"daemon","test_threads":2,"daemon_pool":2},{"os":"macos-latest","test_mode":"wrapper-daemon","test_threads":2,"daemon_pool":2}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"ubuntu-latest","test_mode":"daemon","test_threads":4,"daemon_pool":4},{"os":"ubuntu-latest","test_mode":"wrapper-daemon","test_threads":4,"daemon_pool":4},{"os":"windows-latest","test_mode":"daemon","test_threads":4,"daemon_pool":4},{"os":"windows-latest","test_mode":"wrapper-daemon","test_threads":4,"daemon_pool":4},{"os":"macos-latest","test_mode":"daemon","test_threads":2,"daemon_pool":2},{"os":"macos-latest","test_mode":"wrapper-daemon","test_threads":2,"daemon_pool":2}]}' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test on ${{ matrix.os }} (${{ matrix.test_mode }})
    needs: compute-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # submodules: true
          fetch-depth: 0

      - name: Configure Windows Defender exclusions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Defender real-time scanning of cargo/git/test temp dirs dominates Windows CI wall time.
          # Adding exclusions before any compile/IO has measured ~15-30 min savings on this repo.
          $paths = @(
            "$env:GITHUB_WORKSPACE",
            "$env:RUNNER_TEMP",
            "$env:USERPROFILE\.cargo",
            "$env:USERPROFILE\.rustup"
          )
          foreach ($p in $paths) {
            Add-MpPreference -ExclusionPath $p -ErrorAction SilentlyContinue
          }
          $procs = @("cargo.exe", "rustc.exe", "git.exe", "git-ai.exe", "link.exe", "cargo-nextest.exe")
          foreach ($x in $procs) {
            Add-MpPreference -ExclusionProcess $x -ErrorAction SilentlyContinue
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: test-${{ runner.os }}
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Graphite CLI
        run: npm install -g @withgraphite/graphite-cli@stable

      - name: Install mold linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y mold

      - name: Install cargo-nextest
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-nextest

      - name: Build tests (separate step for timing visibility)
        run: cargo nextest run --no-run --workspace
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-fuse-ld=mold' || '' }}

      - name: Run tests
        run: cargo nextest run --no-fail-fast --retries 2 --test-threads ${{ matrix.test_threads }}
        env:
          CARGO_INCREMENTAL: 0
          GIT_AI_TEST_GIT_MODE: ${{ matrix.test_mode }}
          GIT_AI_TEST_SHARED_DAEMON_POOL_SIZE: ${{ matrix.daemon_pool }}
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-arg=-fuse-ld=mold' || '' }}

      - name: Run doctests
        # nextest does not execute doctests; run them once on Linux daemon to preserve coverage.
        if: runner.os == 'Linux' && matrix.test_mode == 'daemon'
        run: cargo test --doc
        env:
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: -C link-arg=-fuse-ld=mold

  test-ignored:
    name: Test SCM e2e tests on just Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # submodules: true
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ignored-${{ runner.os }}
          cache-on-failure: true

      - name: Run ignored tests
        run: cargo test --test integration github_integration -- --ignored
        env:
          CARGO_INCREMENTAL: 0
