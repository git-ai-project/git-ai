name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: git-ai-x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: git-ai-aarch64-unknown-linux-gnu
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: git-ai-x86_64-apple-darwin
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: git-ai-aarch64-apple-darwin
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: git-ai-x86_64-pc-windows-msvc
            cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get-version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        if: matrix.cross == false
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          rustup target add ${{ matrix.target }}

      - name: Configure cross-compilation environment
        if: matrix.cross == true
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: 0

      - name: Strip binary (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/git-ai

      - name: Strip binary (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/git-ai

      - name: Strip binary (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: strip target/${{ matrix.target }}/release/git-ai

      - name: Strip binary (Windows)
        if: contains(matrix.target, 'windows')
        run: strip target/${{ matrix.target }}/release/git-ai.exe

      - name: Package tarball (Unix)
        if: "!contains(matrix.target, 'windows')"
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/git-ai staging/
          cd staging
          tar czf ../${{ matrix.artifact_name }}.tar.gz git-ai
          cd ..
          rm -rf staging

      - name: Package zip (Windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/git-ai.exe" "staging/"
          Compress-Archive -Path "staging/git-ai.exe" -DestinationPath "${{ matrix.artifact_name }}.zip"
          Remove-Item -Recurse -Force staging

      - name: Upload artifact (Unix)
        if: "!contains(matrix.target, 'windows')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz
          retention-days: 7

      - name: Upload artifact (Windows)
        if: contains(matrix.target, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  build-deb:
    name: Build .deb packages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: git-ai-x86_64-unknown-linux-gnu
          path: artifacts

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: git-ai-aarch64-unknown-linux-gnu
          path: artifacts

      - name: Get version from tag
        id: get-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build deb for amd64
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          PKG_DIR="deb-amd64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"

          # Extract binary from tarball
          tar xzf artifacts/git-ai-x86_64-unknown-linux-gnu.tar.gz -C "$PKG_DIR/usr/bin/"
          chmod 755 "$PKG_DIR/usr/bin/git-ai"

          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: git-ai
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: git-ai-inc <support@git-ai.com>
          Description: AI-powered git attribution tracking
           git-ai transparently tracks AI vs human code authorship through git hooks.
          Section: devel
          Priority: optional
          Depends: git
          EOF
          # Remove leading spaces from control file (heredoc indentation)
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          cat > "$PKG_DIR/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if command -v git-ai >/dev/null 2>&1; then
            git-ai install || true
          fi
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/postinst"
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          dpkg-deb --build "$PKG_DIR" "git-ai_${VERSION}_amd64.deb"

      - name: Build deb for arm64
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          PKG_DIR="deb-arm64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"

          # Extract binary from tarball
          tar xzf artifacts/git-ai-aarch64-unknown-linux-gnu.tar.gz -C "$PKG_DIR/usr/bin/"
          chmod 755 "$PKG_DIR/usr/bin/git-ai"

          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: git-ai
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: git-ai-inc <support@git-ai.com>
          Description: AI-powered git attribution tracking
           git-ai transparently tracks AI vs human code authorship through git hooks.
          Section: devel
          Priority: optional
          Depends: git
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          cat > "$PKG_DIR/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if command -v git-ai >/dev/null 2>&1; then
            git-ai install || true
          fi
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/postinst"
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          dpkg-deb --build "$PKG_DIR" "git-ai_${VERSION}_arm64.deb"

      - name: Upload deb amd64
        uses: actions/upload-artifact@v4
        with:
          name: git-ai-deb-amd64
          path: git-ai_*_amd64.deb
          retention-days: 7

      - name: Upload deb arm64
        uses: actions/upload-artifact@v4
        with:
          name: git-ai-deb-arm64
          path: git-ai_*_arm64.deb
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build, build-deb]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          # Tarballs and zips
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "*.zip" -exec cp {} release/ \;
          # Deb packages
          find artifacts -name "*.deb" -exec cp {} release/ \;

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * | sort > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CHECKSUMS=$(cat release/SHA256SUMS)

          BODY="## git-ai ${VERSION}

          ### Installation

          **macOS/Linux:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
          \`\`\`

          ### Downloads

          | Platform | File |
          |----------|------|
          | Linux x86_64 | \`git-ai-x86_64-unknown-linux-gnu.tar.gz\` |
          | Linux ARM64 | \`git-ai-aarch64-unknown-linux-gnu.tar.gz\` |
          | macOS Intel | \`git-ai-x86_64-apple-darwin.tar.gz\` |
          | macOS Apple Silicon | \`git-ai-aarch64-apple-darwin.tar.gz\` |
          | Windows x86_64 | \`git-ai-x86_64-pc-windows-msvc.zip\` |
          | Linux x86_64 (deb) | \`git-ai_*_amd64.deb\` |
          | Linux ARM64 (deb) | \`git-ai_*_arm64.deb\` |

          ### SHA256 Checksums

          \`\`\`
          ${CHECKSUMS}
          \`\`\`
          "

          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "$BODY" \
            release/*
